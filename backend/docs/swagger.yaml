openapi: 3.0.3
info:
  title: Auto Service Booking API
  version: 1.0.0
  description: REST API for online auto service booking with JWT authentication and idempotent appointments.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
  /api/v1/auth/register:
    post:
      summary: Register customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered
  /api/v1/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
  /api/v1/auth/refresh:
    post:
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed
  /api/v1/auth/logout:
    post:
      summary: Logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Logged out
  /api/v1/services:
    get:
      summary: List services
      responses:
        '200':
          description: Services
  /api/v1/service-categories:
    get:
      summary: List service categories
      responses:
        '200':
          description: Categories
  /api/v1/me:
    get:
      summary: Current profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile
  /api/v1/vehicles:
    post:
      summary: Create vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCreateRequest'
      responses:
        '200':
          description: Created
  /api/v1/vehicles/my:
    get:
      summary: List user vehicles
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Vehicles
  /api/v1/appointments:
    post:
      summary: Create appointment
      security:
        - bearerAuth: []
      parameters:
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppointmentCreateRequest'
      responses:
        '200':
          description: Appointment created
    get:
      summary: List all appointments for admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointments
  /api/v1/appointments/my:
    get:
      summary: List current user's appointments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Appointments
  /api/v1/appointments/available-slots:
    get:
      summary: List available slots
      parameters:
        - in: query
          name: date
          required: true
          schema:
            type: string
            example: "2026-05-02"
        - in: query
          name: service_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Slots
  /api/v1/admin/dashboard:
    get:
      summary: Admin dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Dashboard
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, full_name, phone]
      properties:
        email:
          type: string
        password:
          type: string
        full_name:
          type: string
        phone:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    VehicleCreateRequest:
      type: object
      required: [make, model, year, plate_number]
      properties:
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        plate_number:
          type: string
        color:
          type: string
        vin:
          type: string
    AppointmentCreateRequest:
      type: object
      required: [vehicle_id, service_id, start_time]
      properties:
        vehicle_id:
          type: string
        service_id:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        notes:
          type: string
