server:
  port: "8080"
  read_timeout: 15s
  write_timeout: 30s
  shutdown_timeout: 10s

storage:
  dsn: "postgres://postgres:postgres@postgres:5432/lua_agent?sslmode=disable"

llm:
  endpoint: "http://host.docker.internal:11434"
  model: "qwen2.5-coder:7b"
  timeout: 60s
  num_ctx: 4096
  num_predict: 256
  batch: 1
  parallel: 1

embed:
  endpoint: "http://embed:8081"
  timeout: 30s

validator:
  timeout: 2s

logging:
  level: "info"
